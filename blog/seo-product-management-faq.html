    {"@type":"FAQPage","mainEntity":[
      {"@type":"Question","name":"Why should Product Managers care about Technical SEO?","acceptedAnswer":{"@type":"Answer","text":"Technical debt in SEO—like heavy client-side rendering, slow Core Web Vitals, or missing structured data—directly chokes the organic acquisition funnel. A product's discoverability is a core technical requirement, not a post-launch marketing add-on. Retroactively fixing these issues consumes significant sprint capacity that proactive design prevents."}},
      {"@type":"Question","name":"How is GEO replacing traditional SEO?","acceptedAnswer":{"@type":"Answer","text":"Generative Engine Optimization (GEO) shifts the focus from ranking blue links to being cited as an authoritative source in AI-generated responses by ChatGPT, Perplexity, and Google AI Overviews. GEO success requires entity recognition via structured data, answer-dense content with cited statistics, E-E-A-T signals, and AI crawler access via a properly configured robots.txt."}},
      {"@type":"Question","name":"How do I measure SEO success as a Product Manager?","acceptedAnswer":{"@type":"Answer","text":"Measure Qualified Organic Acquisition (organic traffic that converts or completes core actions), Core Web Vitals scores (LCP, CLS, INP—which directly correlate with conversion rates), and increasingly, AI Citation Share of Voice: how often your brand is mentioned in ChatGPT, Perplexity, and Google AI Overview responses for your target queries."}},
      {"@type":"Question","name":"Do I need a dedicated SEO team to rank well?","acceptedAnswer":{"@type":"Answer","text":"Not initially. Early-stage products succeed by baking SEO fundamentals—fast load times, semantic HTML, SSR architecture, structured data—directly into the product architecture from day one. The goal is to make discoverable product pages as a natural engineering default, not as a separate SEO workstream."}},
      {"@type":"Question","name":"What is llms.txt and why does my product need it?","acceptedAnswer":{"@type":"Answer","text":"llms.txt is an emerging standard file placed at your site root (like robots.txt) that provides AI agents and LLM crawlers with a structured summary of your site's purpose, key pages, and authoritative claims. It signals to AI systems like Claude, GPT, and Perplexity which content is most relevant to index and cite, improving GEO citation rates."}},
      {"@type":"Question","name":"How long does it take for SEO changes to show results?","acceptedAnswer":{"@type":"Answer","text":"Technical fixes (fixing 404s, adding canonical tags, implementing SSR) can show GSC improvements within 2-4 weeks as Googlebot re-crawls. Content improvements and new page indexation typically take 4-12 weeks. GEO citation changes are harder to measure on a timeline as AI model training and retrieval systems update on varying schedules."}},
      {"@type":"Question","name":"Should I prioritize GEO or traditional SEO first?","acceptedAnswer":{"@type":"Answer","text":"Prioritize traditional SEO fundamentals first—server-side rendering, structured data, Core Web Vitals, and sitemap/robots.txt—because they benefit both traditional search and AI engine crawlers simultaneously. Once the technical foundation is solid, layer GEO-specific work: llms.txt, Direct Answer Blocks, and AI citation tracking."}}
